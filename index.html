<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>藥典 · 每日藥物專論</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Instrument+Sans:wght@400;500;600&family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --paper:#E3E7E9;
  --paper-2:#D6DCE0;
  --card:#EFF2F3;
  --ink:#2C363D;
  --ink-2:#5B6A74;
  --ink-3:#8E9AA2;
  --blue:#5F7D91;
  --blue-deep:#4A6376;
  --blue-tint:#C8D5DC;
  --sage:#5D7C77;
  --sage-tint:#CFDBD8;
  --rose:#96706C;
  --rose-tint:#DCCECB;
  --line:#C3CDD3;
  --line-soft:#D3DBDF;
  --serif:'Fraunces','Noto Serif TC',Georgia,serif;
  --sans:'Instrument Sans','Noto Sans TC',system-ui,-apple-system,sans-serif;
  --mono:'IBM Plex Mono','Noto Sans TC',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:transparent;color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
::selection{background:var(--blue-tint);}

.app{
  display:grid;grid-template-columns:264px 1fr;min-height:640px;
  background:var(--paper);border:1px solid var(--line);border-radius:4px;overflow:hidden;
  background-image:radial-gradient(circle at 1px 1px, rgba(70,95,110,.055) 1px, transparent 0);
  background-size:22px 22px;
}
@media (max-width:780px){.app{grid-template-columns:1fr;}}

/* ---------------- sidebar ---------------- */
.rail{background:var(--paper-2);border-right:1px solid var(--line);padding:24px 18px;display:flex;flex-direction:column;gap:20px;}
@media (max-width:780px){.rail{border-right:none;border-bottom:1px solid var(--line);}}
.mark{display:flex;flex-direction:column;gap:2px;}
.mark .rx{font-family:var(--serif);font-weight:600;font-size:15px;color:var(--blue);letter-spacing:.02em;}
.mark .name{font-family:var(--serif);font-weight:600;font-size:23px;line-height:1.05;letter-spacing:.01em;}
.mark .en{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-3);margin-top:3px;}

.stat{border:1px solid var(--line);border-radius:3px;background:var(--card);padding:13px 14px;display:flex;flex-direction:column;gap:1px;position:relative;overflow:hidden;}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--blue);}
.stat .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);}
.stat .v{font-family:var(--serif);font-size:30px;font-weight:600;line-height:1;color:var(--ink);}
.stat .v small{font-size:13px;color:var(--ink-3);font-family:var(--sans);font-weight:400;}

.rail-label{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);padding-left:2px;display:flex;justify-content:space-between;align-items:center;}
.tax-btn{text-transform:none;letter-spacing:0;font-family:var(--sans);font-size:11px;}
.cats{display:flex;flex-direction:column;gap:1px;}
.cat{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:3px;font-size:13.5px;color:var(--ink-2);cursor:pointer;border:1px solid transparent;transition:background .15s,color .15s;}
.cat-l{display:flex;align-items:center;gap:5px;min-width:0;}
.tw{display:inline-block;width:12px;font-size:9px;color:var(--ink-3);transition:transform .15s;flex:none;}
.tw.o{transform:rotate(90deg);}
.cat:hover{background:#CAD3D8;}
.cat.on{background:var(--ink);color:var(--paper);}
.cat.on .tw{color:var(--paper);}
.cat .c{font-family:var(--mono);font-size:11px;opacity:.65;}
.dis-wrap{display:flex;flex-direction:column;gap:1px;margin:1px 0 3px 0;padding-left:17px;border-left:1px solid var(--line);margin-left:14px;}
.dis{display:flex;justify-content:space-between;align-items:center;padding:5px 9px;border-radius:3px;font-size:12.5px;color:var(--ink-3);cursor:pointer;}
.dis:hover{background:#CAD3D8;color:var(--ink-2);}
.dis.on{background:var(--blue-tint);color:var(--blue-deep);font-weight:600;}
.dis .c{font-family:var(--mono);font-size:10px;opacity:.7;}

/* ---------- disease page ---------- */
.dis-head{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;margin-bottom:14px;}
.dis-cat{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-bottom:3px;}
.dis-head h1{font-family:var(--serif);font-weight:600;font-size:29px;margin:0;line-height:1.1;letter-spacing:.005em;}
.dtabs{display:flex;gap:3px;border-bottom:1px solid var(--line);margin-bottom:20px;flex-wrap:wrap;}
.dtab{padding:8px 14px;font-size:13px;font-weight:600;color:var(--ink-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:6px;transition:color .15s;}
.dtab:hover{color:var(--ink-2);}
.dtab.on{color:var(--blue-deep);border-bottom-color:var(--blue);}
.dtab .n{font-family:var(--mono);font-size:10px;background:var(--blue-tint);color:var(--blue-deep);border-radius:8px;padding:1px 6px;}
.dbody{flex:1;}
.doc{background:var(--card);border:1px solid var(--line);border-radius:5px;padding:28px 32px;min-height:220px;}
.doc-body{font-size:14.5px;line-height:1.8;color:var(--ink);white-space:pre-wrap;}
.doc-body.rich{white-space:normal;}
.doc-body.rich h2{font-family:var(--serif);font-size:21px;font-weight:600;margin:22px 0 9px;letter-spacing:.005em;}
.doc-body.rich h3{font-family:var(--serif);font-size:17px;font-weight:600;margin:18px 0 7px;color:var(--blue-deep);}
.doc-body.rich h2:first-child,.doc-body.rich h3:first-child{margin-top:0;}
.doc-body.rich p{margin:0 0 11px;}
.doc-body.rich ul,.doc-body.rich ol{margin:0 0 12px;padding-left:22px;}
.doc-body.rich li{margin-bottom:5px;}
.doc-body.rich a{color:var(--blue);text-decoration:underline;text-underline-offset:2px;}
.doc-body.rich a:hover{color:var(--blue-deep);}
.doc-body.rich img{max-width:100%;height:auto;border-radius:4px;border:1px solid var(--line);margin:8px 0;display:block;}
.doc-body.rich blockquote{margin:12px 0;padding:8px 0 8px 15px;border-left:3px solid var(--blue-tint);color:var(--ink-2);font-style:italic;}
.doc-body.rich table,.rt-ed table{border-collapse:collapse;width:100%;margin:12px 0;font-size:13.5px;}
.doc-body.rich th,.doc-body.rich td,.rt-ed th,.rt-ed td{border:1px solid var(--line);padding:8px 11px;text-align:left;vertical-align:top;line-height:1.55;}
.doc-body.rich th,.rt-ed th{background:var(--paper-2);font-weight:600;font-size:12.5px;}
.doc-body.rich hr{border:none;border-top:1px solid var(--line);margin:18px 0;}

/* rich toolbar */
.sheet.wide{max-width:820px;}
.rt-bar{display:flex;flex-wrap:wrap;align-items:center;gap:2px;padding:7px 8px;border:1px solid var(--line);border-bottom:none;border-radius:4px 4px 0 0;background:var(--paper-2);position:sticky;top:0;z-index:3;}
.rt{background:none;border:1px solid transparent;border-radius:3px;min-width:29px;height:29px;padding:0 6px;cursor:pointer;color:var(--ink-2);font-size:13px;font-family:var(--sans);display:inline-flex;align-items:center;justify-content:center;gap:3px;line-height:1;}
.rt:hover{background:var(--card);border-color:var(--line);color:var(--ink);}
.rt-sel{height:29px;border:1px solid var(--line);border-radius:3px;background:var(--card);font-size:12.5px;color:var(--ink-2);font-family:var(--sans);padding:0 4px;}
.rt-gap{width:1px;height:18px;background:var(--line);margin:0 4px;}
.c-bar{display:block;width:11px;height:3px;border-radius:1px;}
.rt-pop-wrap{position:relative;display:inline-flex;}
.rt-pop{display:none;position:absolute;top:33px;left:0;background:var(--card);border:1px solid var(--line);border-radius:4px;padding:7px;gap:5px;z-index:10;box-shadow:0 8px 20px -8px rgba(45,60,72,.4);}
.rt-pop.on{display:flex;flex-wrap:wrap;width:max-content;}
.rt-pop.wide-pop.on{flex-direction:column;}
.sw{width:21px;height:21px;border:1px solid var(--line);border-radius:3px;cursor:pointer;padding:0;font-size:10px;color:var(--ink-3);}
.sw:hover{transform:scale(1.12);}
.sw.none{background:var(--card);}
.tb-row{display:flex;align-items:center;gap:5px;}
.tb-row label{font-size:11.5px;color:var(--ink-3);}
.tb-row input{width:46px;padding:5px 6px;border:1px solid var(--line);border-radius:3px;font-size:12.5px;background:var(--paper);color:var(--ink);}
.tb-row .btn{padding:5px 10px;font-size:12px;}
.rt-ed{border:1px solid var(--line);border-radius:0 0 4px 4px;background:var(--card);padding:18px 20px;min-height:300px;max-height:46vh;overflow-y:auto;font-size:14.5px;line-height:1.8;color:var(--ink);outline:none;}
.rt-ed:focus{border-color:var(--blue);}
.rt-ed img{max-width:100%;height:auto;border-radius:4px;border:1px solid var(--line);margin:6px 0;}
.rt-ed a{color:var(--blue);text-decoration:underline;}
.rt-ed h2{font-family:var(--serif);font-size:20px;margin:16px 0 8px;}
.rt-ed h3{font-family:var(--serif);font-size:16.5px;margin:14px 0 6px;color:var(--blue-deep);}
.rt-ed blockquote{margin:10px 0;padding-left:14px;border-left:3px solid var(--blue-tint);color:var(--ink-2);}
.rt-ed:empty::before{content:'開始寫…';color:var(--ink-3);}
.doc-empty{text-align:center;color:var(--ink-2);padding:40px 20px;}
.doc-empty p{margin:0 0 6px;font-size:14px;}
.doc-empty .sm{font-size:12.5px;color:var(--ink-3);}

/* comparison table */
.col-pick{margin-bottom:14px;border:1px solid var(--line);border-radius:4px;background:var(--card);}
.col-pick summary{cursor:pointer;padding:9px 13px;font-size:12.5px;font-weight:600;color:var(--ink-2);list-style:none;}
.col-pick summary::-webkit-details-marker{display:none;}
.col-pick summary::before{content:"▸ ";color:var(--ink-3);}
.col-pick[open] summary::before{content:"▾ ";}
.pk-wrap{display:flex;flex-wrap:wrap;gap:5px;padding:2px 13px 12px;}
.pk{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--ink-2);background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:4px 11px;cursor:pointer;}
.pk:hover{border-color:var(--blue);}
.pk input{accent-color:var(--blue);margin:0;}
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:5px;background:var(--card);}
table.cmp{border-collapse:collapse;width:100%;font-size:13px;}
table.cmp th,table.cmp td{padding:11px 13px;text-align:left;vertical-align:top;border-bottom:1px solid var(--line-soft);}
table.cmp thead th{background:var(--paper-2);font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2);font-weight:600;white-space:nowrap;position:sticky;top:0;}
table.cmp tbody tr{cursor:pointer;transition:background .12s;}
table.cmp tbody tr:hover{background:var(--blue-tint);}
table.cmp tbody tr:last-child td{border-bottom:none;}
table.cmp td{line-height:1.55;min-width:150px;}
.cmp .stick{position:sticky;left:0;background:var(--card);z-index:1;min-width:145px;box-shadow:1px 0 0 var(--line);}
.cmp thead .stick{background:var(--paper-2);z-index:2;}
.cmp tbody tr:hover .stick{background:var(--blue-tint);}
.cmp .tn{font-family:var(--serif);font-weight:600;font-size:14.5px;display:block;line-height:1.2;}
.cmp .tt{font-family:var(--serif);font-style:italic;font-size:12px;color:var(--blue);display:block;margin-top:2px;}
.cmp .dash{color:var(--ink-3);}

/* group headings in library */
.grp{margin-bottom:22px;}
.grp-h{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
.grp-h .nm{font-family:var(--serif);font-weight:600;font-size:16px;color:var(--ink);white-space:nowrap;}
.grp-h .cnt{font-family:var(--mono);font-size:10px;color:var(--ink-3);}
.grp-h .ln{flex:1;height:1px;background:var(--line);}

/* taxonomy manager */
.tax-cat{border:1px solid var(--line);border-radius:4px;background:var(--card);padding:11px 12px;margin-bottom:10px;}
.tax-row{display:flex;align-items:center;gap:6px;}
.tax-row input{flex:1;padding:7px 9px;border:1px solid var(--line);border-radius:3px;font-size:13.5px;background:var(--paper);font-family:var(--sans);color:var(--ink);}
.tax-row.sub input{font-size:12.5px;background:var(--card);}
.ico{background:none;border:1px solid var(--line);border-radius:3px;width:27px;height:27px;cursor:pointer;color:var(--ink-3);font-size:11px;flex:none;line-height:1;}
.ico:hover{background:var(--blue-tint);color:var(--blue-deep);border-color:var(--blue);}
.ico.dz:hover{background:var(--rose-tint);color:var(--rose);border-color:var(--rose);}
.tax-subs{padding-left:14px;margin-top:7px;border-left:1px solid var(--line);margin-left:6px;display:flex;flex-direction:column;gap:5px;}
.tax-note{font-family:var(--mono);font-size:10px;color:var(--ink-3);padding:2px 0 0 6px;}
.rail-foot{margin-top:auto;display:flex;flex-direction:column;gap:8px;}

.btn{font-family:var(--sans);border:1px solid transparent;border-radius:3px;padding:10px 13px;font-size:13.5px;font-weight:600;cursor:pointer;transition:transform .07s,background .15s,border-color .15s;}
.btn:active{transform:translateY(1px);}
.btn:focus-visible,.cat:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--sage);outline-offset:2px;}
.btn-solid{background:var(--ink);color:var(--paper);}
.btn-solid:hover{background:#3d4a53;}
.btn-line{background:transparent;color:var(--ink-2);border-color:var(--line);}
.btn-line:hover{background:#CAD3D8;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-blue:hover{background:var(--blue-deep);}
.btn:disabled{opacity:.4;cursor:default;transform:none;}
.data-row{display:flex;align-items:center;justify-content:center;gap:8px;padding-top:4px;}
.data-row .sep{color:var(--line);}
.mini{background:none;border:none;font-family:var(--sans);font-size:11.5px;color:var(--ink-3);cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:2px;}
.mini:hover{color:var(--blue);}
.usage{font-family:var(--mono);font-size:9.5px;color:var(--ink-3);text-align:center;padding-top:3px;line-height:1.5;}
.usage.warn{color:var(--rose);}

/* ---------------- main ---------------- */
.main{padding:24px 30px 28px;display:flex;flex-direction:column;gap:20px;min-height:640px;}
.bar{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;border-bottom:1px solid var(--line);padding-bottom:14px;flex-wrap:wrap;}
.tabs{display:flex;gap:2px;}
.tab{padding:8px 4px;margin-right:20px;font-size:14px;font-weight:600;color:var(--ink-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-15px;transition:color .15s;}
.tab:hover{color:var(--ink-2);}
.tab.on{color:var(--ink);border-bottom-color:var(--blue);}
.bar-note{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);}
.area{flex:1;display:flex;flex-direction:column;}

/* strength pips */
.pips{display:inline-flex;gap:3px;align-items:center;}
.pip{width:14px;height:5px;border-radius:1px;background:var(--line);}
.pip.f{background:var(--blue);}
.pips.sm .pip{width:9px;height:4px;}

/* eyebrow */
.eyebrow{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sage);}
.eyebrow .rx{font-family:var(--serif);font-style:italic;font-size:14px;font-weight:600;text-transform:none;letter-spacing:0;}
.eyebrow .dot{width:3px;height:3px;border-radius:50%;background:var(--line);}
.eyebrow .flag{color:var(--rose);}

/* ---------- review ---------- */
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:8px 0;}
.progress{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--ink-3);}
.progress b{color:var(--ink);font-weight:600;}

.card-flip{width:100%;max-width:540px;min-height:340px;perspective:1600px;cursor:pointer;}
.flipper{position:relative;width:100%;min-height:340px;transition:transform .55s cubic-bezier(.4,.15,.2,1);transform-style:preserve-3d;}
.card-flip.flip .flipper{transform:rotateY(180deg);}
.side{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--card);border:1px solid var(--line);border-radius:5px;box-shadow:0 1px 0 #fff inset,0 14px 30px -18px rgba(45,60,72,.28);display:flex;flex-direction:column;overflow:hidden;}
.side.back{transform:rotateY(180deg);}
.glass{height:7px;background:linear-gradient(90deg,var(--blue),var(--blue-tint));opacity:.85;flex:none;}
.side-body{padding:26px 30px;display:flex;flex-direction:column;flex:1;}
.side.back .side-body{overflow-y:auto;max-height:440px;}

.rx-name{font-family:var(--serif);font-weight:600;font-size:32px;line-height:1.08;letter-spacing:.005em;margin-top:14px;}
.rx-trade{font-family:var(--serif);font-style:italic;font-weight:500;font-size:17px;color:var(--blue);margin-top:5px;}
.rx-photo{margin-top:16px;max-height:130px;width:auto;max-width:100%;object-fit:contain;border:1px solid var(--line);border-radius:3px;background:#fff;padding:4px;align-self:flex-start;}
.back-photo{margin:4px 0 12px;max-height:104px;}
.ph-box{display:flex;gap:11px;align-items:flex-start;}
.ph-prev{width:92px;height:92px;flex:none;border:1px solid var(--line);border-radius:4px;background:var(--paper);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.ph-prev img{max-width:100%;max-height:100%;object-fit:contain;}
.ph-none{font-size:10.5px;color:var(--ink-3);font-family:var(--mono);text-align:center;}
.ph-ctl{flex:1;display:flex;flex-direction:column;gap:6px;align-items:flex-start;}
.ph-ctl .btn{padding:7px 12px;font-size:12.5px;}
.ph-hint{font-size:11px;color:var(--ink-3);line-height:1.5;}
.flip-hint{margin-top:auto;padding-top:18px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-3);}
.flip-hint .ln{flex:1;height:1px;background:var(--line);}

.mono-line{font-family:var(--serif);font-weight:600;font-size:22px;margin-bottom:2px;}
.entry{padding:13px 0;border-top:1px solid var(--line-soft);}
.entry:first-of-type{border-top:none;padding-top:2px;}
.entry h4{margin:0 0 5px;font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--blue);font-weight:600;display:flex;align-items:center;gap:6px;}
.entry p{margin:0;font-size:14px;line-height:1.62;color:var(--ink);white-space:pre-wrap;}
.entry.data p{font-family:var(--mono);font-size:13px;line-height:1.6;}
.chip{display:inline-block;background:var(--sage-tint);color:var(--sage);border-radius:2px;padding:2px 8px;font-size:12px;font-weight:600;}
.chip.warn{background:var(--rose-tint);color:var(--rose);}

.verdict{display:flex;gap:12px;width:100%;max-width:540px;}
.verdict .btn{flex:1;padding:14px;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:8px;border-radius:4px;}
.v-forgot{background:var(--rose-tint);color:var(--rose);}
.v-forgot:hover{background:#D2C0BC;}
.v-good{background:var(--sage-tint);color:var(--sage);}
.v-good:hover{background:#C0D0CC;}

/* empty / finish */
.empty{text-align:center;color:var(--ink-2);max-width:380px;margin:auto;padding:40px 20px;}
.empty .rx-mark{font-family:var(--serif);font-style:italic;font-size:40px;color:var(--blue);opacity:.5;}
.empty .big{font-family:var(--serif);font-weight:600;font-size:22px;color:var(--ink);margin:10px 0 6px;}
.empty p{font-size:14px;line-height:1.6;margin:0;}

/* ---------- library ---------- */
.search{display:flex;gap:10px;margin-bottom:18px;}
.search input{flex:1;padding:11px 14px;border:1px solid var(--line);border-radius:3px;font-size:14px;background:var(--card);font-family:var(--sans);color:var(--ink);}
.search input::placeholder{color:var(--ink-3);}
.cv-banner{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--blue-tint);border:1px solid var(--blue);border-radius:4px;padding:11px 15px;margin-bottom:16px;font-size:13.5px;color:var(--blue-deep);}
.cv-banner b{font-family:var(--serif);font-size:16px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px;}
.mono-card{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:16px 17px;cursor:pointer;transition:border-color .15s,transform .1s,box-shadow .15s;display:flex;flex-direction:column;gap:9px;}
.mono-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 10px 24px -16px rgba(45,60,72,.32);}
.mono-card .g{font-family:var(--serif);font-weight:600;font-size:19px;line-height:1.12;}
.mono-card .t{font-family:var(--serif);font-style:italic;font-size:13.5px;color:var(--blue);margin-top:-5px;}
.mono-card .foot{display:flex;justify-content:space-between;align-items:center;margin-top:2px;}
.mono-card .nx{font-family:var(--mono);font-size:10px;color:var(--ink-3);}
.badge{display:inline-block;background:var(--sage-tint);color:var(--sage);font-size:10px;font-weight:700;padding:2px 7px;border-radius:2px;font-family:var(--sans);}

/* ---------- explore ---------- */
.picker{max-width:500px;margin:auto;display:flex;flex-direction:column;gap:14px;padding:30px 0;}
.picker .lead{text-align:center;}
.picker .lead .rx-mark{font-family:var(--serif);font-style:italic;font-size:34px;color:var(--blue);opacity:.55;}
.picker .lead h3{font-family:var(--serif);font-weight:600;font-size:21px;margin:8px 0 4px;}
.picker .lead p{font-size:13.5px;color:var(--ink-2);margin:0;}
.picker select{padding:12px 14px;border:1px solid var(--line);border-radius:3px;font-size:14px;background:var(--card);font-family:var(--sans);color:var(--ink);}

.read{max-width:620px;margin:0 auto;width:100%;}
.read-rail{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.step{display:flex;align-items:center;gap:8px;flex:1;}
.step .num{font-family:var(--serif);font-size:13px;font-weight:600;width:24px;height:24px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink-3);flex:none;}
.step.done .num{background:var(--sage);border-color:var(--sage);color:#fff;}
.step.cur .num{background:var(--blue);border-color:var(--blue);color:#fff;}
.step .ln{flex:1;height:1px;background:var(--line);}
.step:last-child .ln{display:none;}

.folio{background:var(--card);border:1px solid var(--line);border-radius:5px;padding:34px 38px;min-height:300px;box-shadow:0 14px 30px -20px rgba(45,60,72,.28);animation:rise .45s cubic-bezier(.2,.7,.3,1);display:flex;flex-direction:column;}
@keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.folio .roman{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--blue);letter-spacing:.05em;}
.folio .ch-label{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-top:2px;}
.folio h2{font-family:var(--serif);font-weight:600;font-size:26px;line-height:1.15;margin:14px 0 16px;}
.folio .txt{font-size:15px;line-height:1.75;color:var(--ink);white-space:pre-wrap;flex:1;}
.read-nav{display:flex;justify-content:space-between;margin-top:20px;}

/* ---------- modal ---------- */
.veil{position:fixed;inset:0;background:rgba(38,50,58,.5);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:60;padding:18px;}
.sheet{background:var(--paper);border:1px solid var(--line);border-radius:5px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;padding:26px 28px;box-shadow:0 30px 60px -20px rgba(0,0,0,.4);}
.sheet h3{font-family:var(--serif);font-weight:600;font-size:22px;margin:0 0 3px;}
.sheet .sub{font-size:12.5px;color:var(--ink-3);margin-bottom:18px;line-height:1.5;}
.fld{margin-bottom:13px;}
.fld label{display:block;font-family:var(--sans);font-size:11.5px;font-weight:600;color:var(--ink-2);margin-bottom:5px;letter-spacing:.01em;}
.fld label .en{color:var(--ink-3);font-weight:400;}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:3px;font-size:13.5px;font-family:var(--sans);background:var(--card);color:var(--ink);}
.fld textarea{min-height:62px;resize:vertical;line-height:1.55;}
.duo{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.rowx{display:grid;grid-template-columns:1fr 1.5fr auto;gap:7px;margin-bottom:8px;align-items:start;}
.rowx input,.rowx textarea{width:100%;padding:8px 9px;border:1px solid var(--line);border-radius:3px;font-size:13px;background:var(--card);font-family:var(--sans);}
.rowx textarea{min-height:36px;resize:vertical;}
.rm{background:var(--rose-tint);color:var(--rose);border:none;border-radius:3px;width:32px;height:32px;cursor:pointer;font-size:15px;}
.sheet-foot{display:flex;justify-content:flex-end;gap:9px;margin-top:18px;align-items:center;}
.link{background:none;border:none;color:var(--rose);font-size:12.5px;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:2px;}
.paste{width:100%;min-height:230px;font-family:var(--mono);font-size:12.5px;padding:13px;border:1px solid var(--line);border-radius:3px;background:var(--card);line-height:1.6;color:var(--ink);}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink);color:var(--paper);padding:11px 20px;border-radius:3px;font-size:13px;z-index:80;opacity:0;transition:opacity .25s,transform .25s;font-weight:500;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.boot{padding:80px 20px;text-align:center;color:var(--ink-3);font-family:var(--serif);font-style:italic;font-size:18px;}

@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

let state={cards:[],tax:[],filter:"全部",fdis:null,dtab:'overview',open:{},search:"",view:"review",queue:[],qi:0,flip:false,exId:"",exStep:0};
let toastT=null;

function uid(){return 'd'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function esc(s){return (s||'').toString().replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

/* 儲存轉接層：在 Claude 環境用 window.storage，在真實網站(GitHub Pages)用瀏覽器本機儲存 */
const store={
  async get(k){
    if(window.storage&&window.storage.get){
      try{return await window.storage.get(k,false);}catch(e){}
    }
    const v=localStorage.getItem(k);
    return v?{key:k,value:v}:null;
  },
  async set(k,v){
    if(window.storage&&window.storage.set){
      try{return await window.storage.set(k,v,false);}catch(e){}
    }
    localStorage.setItem(k,v);
    return {key:k};
  }
};
async function loadData(){
  try{
    const r=await store.get('drug-kb');
    if(r&&r.value){state.cards=JSON.parse(r.value);}
    else{state.cards=SEED_CARDS;}
  }catch(e){state.cards=SEED_CARDS;}
  try{
    const t=await store.get('drug-tax');
    state.tax=(t&&t.value)?JSON.parse(t.value):JSON.parse(JSON.stringify(DEFAULT_TAX));
  }catch(e){state.tax=JSON.parse(JSON.stringify(DEFAULT_TAX));}
  syncTax();
  await saveData();
}
// 確保卡片用到的科別/疾病一定存在於階層中（舊資料自動補進來，不會消失）
function syncTax(){
  state.cards.forEach(c=>{
    if(!c.category)c.category='其他';
    let t=findCat(c.category);
    if(!t){t={id:uid(),name:c.category,diseases:[]};state.tax.push(t);}
    if(c.disease&&!t.diseases.some(d=>d.name===c.disease)){t.diseases.push({id:uid(),name:c.disease});}
  });
}
async function saveData(){
  try{
    await store.set('drug-kb',JSON.stringify(state.cards));
    await store.set('drug-tax',JSON.stringify(state.tax));
  }catch(e){toast('儲存失敗，請確認瀏覽器允許儲存資料');}
}
function toast(msg){
  clearTimeout(toastT);
  let t=document.querySelector('.toast');
  if(!t){t=document.createElement('div');t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');
  toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

function mergeCards(incoming){
  let added=0;
  incoming.forEach(src=>{
    const g=(src.generic||'').trim().toLowerCase();
    if(!g)return;
    if(state.cards.some(c=>(c.generic||'').trim().toLowerCase()===g))return;
    const c=JSON.parse(JSON.stringify(src));
    c.id=c.id||uid();c.nextReview=c.nextReview||todayStr();
    c.level=c.level||0;c.reviewCount=c.reviewCount||0;
    state.cards.push(c);added++;
  });
  return added;
}
function restoreCV(){
  const n=mergeCards(CV_PACK);
  syncTax();saveData();buildQueue();render();
  toast(n>0?`已載入 ${n} 個心臟血管藥物`:'這些藥物已經都在庫裡了');
}
function exportData(){
  const payload={version:2,exportedAt:todayStr(),taxonomy:state.tax,cards:state.cards};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='藥典備份-'+todayStr()+'.json';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},100);
  toast('已下載備份檔，請妥善保存');
}
function importData(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json,application/json';
  inp.onchange=()=>{
    const f=inp.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const raw=JSON.parse(r.result);
        const arr=Array.isArray(raw)?raw:(raw&&Array.isArray(raw.cards)?raw.cards:null);
        if(!arr){toast('檔案格式不對，需要是藥典的備份 JSON');return;}
        if(raw&&Array.isArray(raw.taxonomy)){
          raw.taxonomy.forEach(t=>{
            let ex=findCat(t.name);
            if(!ex){ex={id:t.id||uid(),name:t.name,diseases:[]};state.tax.push(ex);}
            (t.diseases||[]).forEach(d=>{
              const cur=ex.diseases.find(x=>x.name===d.name);
              if(!cur){ex.diseases.push({id:d.id||uid(),name:d.name,overview:d.overview||'',guideline:d.guideline||'',cols:d.cols||[]});}
              else{if(!cur.overview&&d.overview)cur.overview=d.overview;if(!cur.guideline&&d.guideline)cur.guideline=d.guideline;if((!cur.cols||!cur.cols.length)&&d.cols)cur.cols=d.cols;}
            });
          });
        }
        const n=mergeCards(arr);
        syncTax();saveData();buildQueue();render();
        toast(n>0?`已從備份匯入 ${n} 個藥物`:'備份裡的藥物已經都在庫裡了');
      }catch(e){toast('無法讀取這個檔案，請確認是藥典備份檔');}
    };
    r.readAsText(f);
  };
  inp.click();
}
function isDue(c){return !c.nextReview || c.nextReview<=todayStr();}
function inFilter(c){
  if(state.filter==="全部")return true;
  if(c.category!==state.filter)return false;
  if(state.fdis===null)return true;
  return (c.disease||NO_DIS)===state.fdis;
}
function dueCards(all){return state.cards.filter(c=>isDue(c)&&(all?true:inFilter(c)));}
function buildQueue(){state.queue=dueCards(false).sort((a,b)=>(a.nextReview||"").localeCompare(b.nextReview||""));state.qi=0;state.flip=false;}
function markReview(c,ok){
  const i=state.cards.findIndex(x=>x.id===c.id);if(i<0)return;
  let lv=state.cards[i].level||0;lv=ok?Math.min(lv+1,INTERVALS.length-1):0;
  const n=new Date();n.setDate(n.getDate()+INTERVALS[lv]);
  state.cards[i].level=lv;state.cards[i].nextReview=n.toISOString().slice(0,10);
  state.cards[i].reviewCount=(state.cards[i].reviewCount||0)+1;state.cards[i].lastReviewed=todayStr();
  saveData();
}
function pipsHTML(lv){let h='<span class="pips sm">';for(let i=0;i<INTERVALS.length;i++){const on=(lv||0)>0&&i<=(lv||0);h+='<span class="pip'+(on?' f':'')+'"></span>';}return h+'</span>';}

function renderReview(){
  const area=document.getElementById('area');
  if(state.queue.length===0)buildQueue();
  if(state.queue.length===0){
    const other=dueCards(true).length;
    if(other>0){
      area.innerHTML=`<div class="stage"><div class="empty"><div class="rx-mark">℞</div><div class="big">這個範圍今天沒有到期的藥物</div><p>目前篩選在「${esc(state.filter)}${state.fdis?' › '+esc(state.fdis):''}」。其他科別還有 <b>${other}</b> 個藥物待複習。</p><br><button class="btn btn-blue" id="clrF">看全部待複習</button></div></div>`;
      document.getElementById('clrF').onclick=()=>{state.filter="全部";state.fdis=null;buildQueue();render();};
      return;
    }
    area.innerHTML=`<div class="stage"><div class="empty"><div class="rx-mark">℞</div><div class="big">今天沒有到期的藥物</div><p>都複習完了。到「藥典庫」新增藥物，或用「深讀」深入認識一個新藥。</p></div></div>`;return;
  }
  if(state.qi>=state.queue.length){
    area.innerHTML=`<div class="stage"><div class="empty"><div class="rx-mark">℞</div><div class="big">本輪完成</div><p>今天複習了 ${state.queue.length} 個藥物。明天再回來，間隔會自動幫你安排。</p></div></div>`;return;
  }
  const c=state.queue[state.qi];
  const fresh=(c.reviewCount||0)===0;
  const entries=[];
  const add=(label,val,cls)=>{if(val&&val.trim())entries.push(`<div class="entry ${cls||''}"><h4>${label}</h4><p>${esc(val)}</p></div>`);};
  add('機轉',c.mechanism);
  if((c.formulation&&c.formulation.trim())||(c.dosing&&c.dosing.trim())){
    entries.push(`<div class="entry data"><h4>劑型 · 劑量</h4><p>${esc([c.formulation,c.dosing].filter(x=>x&&x.trim()).join('\n'))}</p></div>`);
  }
  add('常見用法',c.commonUsage);
  add('適應症',c.indications);
  if(c.guideline&&c.guideline.trim())entries.push(`<div class="entry"><h4>指引地位</h4><p><span class="chip">${esc(c.guideline)}</span></p></div>`);
  add('近期文獻',c.literature);
  (c.extraFields||[]).filter(f=>f.label&&f.value).forEach(f=>add(esc(f.label),f.value));

  area.innerHTML=`<div class="stage">
    <div class="progress"><b>${state.qi+1}</b> / ${state.queue.length}　·　熟練度 ${pipsHTML(c.level)}</div>
    <div class="card-flip ${state.flip?'flip':''}" id="flip">
      <div class="flipper">
        <div class="side front"><div class="glass"></div><div class="side-body">
          <div class="eyebrow"><span class="rx">℞</span><span>${esc(c.category||'未分類')}</span>${fresh?'<span class="dot"></span><span class="flag">新藥物</span>':''}</div>
          <div class="rx-name">${esc(c.generic||'(未命名)')}</div>
          ${c.trade?`<div class="rx-trade">${esc(c.trade)}</div>`:''}
          ${c.photoUrl?`<img src="${c.photoUrl}" class="rx-photo" alt="外觀" onerror="this.style.display='none'">`:''}
          <div class="flip-hint"><span class="ln"></span>翻面看重點<span class="ln"></span></div>
        </div></div>
        <div class="side back"><div class="glass"></div><div class="side-body">
          <div class="mono-line">${esc(c.generic||'')}</div>
          ${c.photoUrl?`<img src="${c.photoUrl}" class="rx-photo back-photo" alt="外觀" onerror="this.style.display='none'">`:''}
          ${entries.join('')||'<p style="color:var(--ink-3);font-size:13px;">這張卡還沒有內容，點藥典庫編輯補上。</p>'}
        </div></div>
      </div>
    </div>
    <div class="verdict">
      <button class="btn v-forgot" id="forgot">再看一次</button>
      <button class="btn v-good" id="good">記得了</button>
    </div>
  </div>`;

  document.getElementById('flip').onclick=()=>{state.flip=!state.flip;render();};
  document.getElementById('forgot').onclick=e=>{e.stopPropagation();markReview(c,false);state.qi++;state.flip=false;render();};
  document.getElementById('good').onclick=e=>{e.stopPropagation();markReview(c,true);state.qi++;state.flip=false;render();};
}

const CORE_FIELDS={'機轉':'mechanism','劑型':'formulation','常用劑量':'dosing','常見用法':'commonUsage','適應症':'indications','指引地位':'guideline','近期文獻':'literature','臨床情境':'clinicalContext'};
function fieldVal(c,f){
  if(CORE_FIELDS[f])return c[CORE_FIELDS[f]]||'';
  const e=(c.extraFields||[]).find(x=>x.label===f);
  return e?e.value:'';
}
function fieldOpts(cards){
  const extra=[...new Set(cards.flatMap(c=>(c.extraFields||[]).map(f=>f.label).filter(Boolean)))];
  return [...Object.keys(CORE_FIELDS),...extra];
}
function defaultCols(cards){
  const counts={};
  cards.forEach(c=>(c.extraFields||[]).forEach(f=>{if(f.label)counts[f.label]=(counts[f.label]||0)+1;}));
  const common=Object.keys(counts).filter(k=>counts[k]>=2).slice(0,3);
  return ['常用劑量',...common];
}
function getDisNode(){
  const t=findCat(state.filter);
  return t?t.diseases.find(d=>d.name===state.fdis):null;
}
function renderDisease(){
  const area=document.getElementById('area');
  const node=getDisNode();
  const cards=state.cards.filter(c=>c.category===state.filter&&(c.disease||NO_DIS)===state.fdis);
  const tabs=[['overview','疾病概論'],['guideline','治療指引'],['compare','藥物比較'],['drugs','藥物清單']];
  const nav=tabs.map(([k,l])=>`<div class="dtab ${state.dtab===k?'on':''}" data-d="${k}">${l}${k==='drugs'?`<span class="n">${cards.length}</span>`:''}</div>`).join('');

  let body='';
  if(state.dtab==='overview'||state.dtab==='guideline'){
    const txt=node?(state.dtab==='overview'?node.overview:node.guideline):'';
    const hint=state.dtab==='overview'
      ? '病理生理、診斷標準、治療目標——為什麼要治。'
      : '權威學會的治療流程、用藥順序與目標值——該怎麼治。';
    body=`<div class="doc">${txt?`<div class="doc-body rich">${toHTML(txt)}</div>`
      :`<div class="doc-empty"><p>${hint}</p><p class="sm">這裡還沒有內容。點右上角「編輯」寫入，或請 Claude 幫你整理後貼上。</p></div>`}</div>`;
  }
  else if(state.dtab==='compare'){
    if(!cards.length){
      body=`<div class="doc"><div class="doc-empty"><p>這個疾病底下還沒有藥物，無法比較。</p></div></div>`;
    }else{
      const opts=fieldOpts(cards);
      let cols=(node&&node.cols&&node.cols.length)?node.cols.filter(c=>opts.includes(c)):defaultCols(cards);

/* ---------------- rich text ---------------- */
const OK_TAGS=['P','BR','DIV','SPAN','B','STRONG','I','EM','U','S','STRIKE','H2','H3','H4','UL','OL','LI','A','TABLE','THEAD','TBODY','TR','TH','TD','IMG','BLOCKQUOTE','HR','FONT','CODE','PRE'];
const KILL_TAGS='script,style,iframe,object,embed,link,meta,form,input,button,select,textarea,svg,math,base,applet,frame,frameset';
const OK_STYLE=/^(color|background-color|font-size|font-weight|font-style|text-align|text-decoration)$/i;
function cleanHTML(html){
  // 關鍵：用 DOMParser 建立惰性文件來解析。
  // 若用 innerHTML 解析，<img src=x onerror=...> 會在「清理之前」就先觸發 onerror，
  // 等於淨化還沒開始就已經中招。DOMParser 的文件不會載入圖片、也不會執行事件。
  const doc=new DOMParser().parseFromString(html,'text/html');
  const d=doc.body;
  // 1) 危險標籤連同內容整個移除
  d.querySelectorAll(KILL_TAGS).forEach(e=>e.remove());
  // 2) 一次抓齊所有元素再處理：拆掉父層時，子層仍在清單裡，不會逃過檢查
  [...d.querySelectorAll('*')].forEach(el=>{
    if(!OK_TAGS.includes(el.tagName)){
      const f=document.createDocumentFragment();
      while(el.firstChild)f.appendChild(el.firstChild);
      el.replaceWith(f);return;
    }
    [...el.attributes].forEach(a=>{
      const k=a.name.toLowerCase(),v=(a.value||'').trim();
      if(k.startsWith('on')){el.removeAttribute(a.name);return;}   // onclick/onerror…
      if(k==='style'){
        const s=v.split(';').map(x=>x.trim()).filter(x=>{
          const prop=x.split(':')[0].trim();
          return x&&OK_STYLE.test(prop)&&!/url\(|expression|javascript:/i.test(x);
        }).join('; ');
        s?el.setAttribute('style',s):el.removeAttribute('style');
        return;
      }
      if(k==='href'&&el.tagName==='A'){
        if(!/^(https?:|mailto:|#)/i.test(v))el.removeAttribute(a.name);  // 擋 javascript:
        return;
      }
      if(k==='src'&&el.tagName==='IMG'){
        if(!/^(data:image\/|https?:)/i.test(v))el.removeAttribute(a.name);
        return;
      }
      if(k==='colspan'||k==='rowspan'||k==='alt')return;
      el.removeAttribute(a.name);
    });
    if(el.tagName==='A'){el.setAttribute('target','_blank');el.setAttribute('rel','noopener noreferrer');}
  });
  return d.innerHTML;
}
function isHTML(s){return /<[a-z][\s\S]*>/i.test(s||'');}
function toHTML(s){
  if(!s)return '';
  if(isHTML(s))return cleanHTML(s);   // 已儲存/匯入的內容渲染前也要淨化
  return esc(s).replace(/\n/g,'<br>');
}
function stripHTML(s){
  if(!isHTML(s))return s||'';
  const d=document.createElement('div');d.innerHTML=s;
  return (d.textContent||'').replace(/\s+/g,' ').trim();
}

  try{document.execCommand('styleWithCSS',false,true);}catch(e){}

  function curTable(){

      const im=new Image();

        const MAX=560;let w=im.width,h=im.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        const cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(im,0,0,w,h);

        document.execCommand('insertHTML',false,`<img src="${cv.toDataURL('image/jpeg',0.78)}" alt="圖片"><p><br></p>`);

    };

  document.getElementById('ds').onclick=()=>{

  };
}

function renderLibrary(){
  const area=document.getElementById('area');
  if(state.fdis!==null&&findCat(state.filter)){renderDisease();return;}
  let list=state.cards.filter(inFilter);
  const q=state.search.trim().toLowerCase();
  if(q)list=list.filter(c=>(c.generic||'').toLowerCase().includes(q)||(c.trade||'').toLowerCase().includes(q));

  // 依「科別 › 疾病」分組呈現階層

    if(state.fdis!==null||q){
      body=`<div class="grid">${list.map(cardHTML).join('')}</div>`;
    }else{
      const cats=state.filter==="全部"?state.tax.map(t=>t.name):[state.filter];
      cats.forEach(cn=>{
        const inCat=list.filter(c=>c.category===cn);

        });
      });
    }

  const missingCV=CV_PACK.filter(s=>!state.cards.some(c=>(c.generic||'').trim().toLowerCase()===(s.generic||'').trim().toLowerCase())).length;
  const cvBanner=missingCV>0?`<div class="cv-banner"><span>還有我們一起建立過的 <b>${missingCV}</b> 個心臟血管藥物可以還原。</span><button class="btn btn-blue" id="loadcv">一鍵載入</button></div>`:'';

      <button class="btn btn-blue" id="start">開始深讀</button>
    </div>`;
    document.getElementById('start').onclick=()=>{state.exId=document.getElementById('pick').value;state.exStep=0;renderExplore();};
    return;
  }
  const c=state.cards.find(x=>x.id===state.exId);
  if(!c){state.exId="";renderExplore();return;}
  const chs=chapters(c);
  if(state.exStep>=chs.length){
    if(!c.deepLearned){c.deepLearned=true;saveData();}
    area.innerHTML=`<div class="read"><div class="empty"><div class="rx-mark">℞</div><div class="big">已讀完《${esc(c.generic||'')}》</div><p>這張卡已進入複習排程，之後會依間隔再出現，幫你長期記住。</p><br><button class="btn btn-blue" id="fin">回到選擇</button></div></div>`;
    document.getElementById('fin').onclick=()=>{state.exId="";state.exStep=0;render();};return;
  }
  const ch=chs[state.exStep];
  const steps=chs.map((s,i)=>`<div class="step ${i<state.exStep?'done':(i===state.exStep?'cur':'')}"><span class="num">${i<state.exStep?'✓':i+1}</span><span class="ln"></span></div>`).join('');
  area.innerHTML=`<div class="read">
    <div class="read-rail">${steps}</div>
    <div class="folio">
      <div class="roman">${ROMAN[state.exStep]}</div>
      <div class="ch-label">${esc(ch.label)}</div>
      <h2>${esc(ch.title)}</h2>
      <div class="txt">${esc(ch.txt)}</div>
    </div>
    <div class="read-nav">
      <button class="btn btn-line" id="prev" ${state.exStep===0?'disabled':''}>← 上一章</button>
      <button class="btn btn-blue" id="next">${state.exStep===chs.length-1?'完成深讀':'繼續 →'}</button>
    </div>
  </div>`;
  document.getElementById('prev').onclick=()=>{if(state.exStep>0){state.exStep--;renderExplore();}};
  document.getElementById('next').onclick=()=>{state.exStep++;renderExplore();};
}

/* ---------------- edit modal ---------------- */
function openEdit(card){
  const isNew=!card;
  const c=card||{id:uid(),category:(catNames()[0]||'其他')};
  const veil=document.createElement('div');veil.className='veil';
  veil.innerHTML=`<div class="sheet">
    <h3>${isNew?'新增藥物':'編輯藥物'}</h3>
    <div class="sub">建議查證權威指引（ACC/AHA、ADA、IDSA、KDIGO 等）後填入。內容以「複習用的重點」為主，不必照抄仿單。</div>
    <div class="duo">
      <div class="fld"><label>學名 <span class="en">Generic</span></label><input id="f_gen" value="${esc(c.generic||'')}"></div>
      <div class="fld"><label>商品名 <span class="en">Trade</span></label><input id="f_tra" value="${esc(c.trade||'')}"></div>
    </div>
    <div class="duo">
      <div class="fld"><label>科別 <span class="en">Category</span></label><select id="f_cat">${catNames().map(x=>`<option ${c.category===x?'selected':''}>${esc(x)}</option>`).join('')}</select></div>
      <div class="fld"><label>疾病 <span class="en">選現有的，或直接打新的</span></label><input id="f_dis" list="disList" value="${esc(c.disease||'')}" placeholder="例如：血脂異常"><datalist id="disList"></datalist></div>
    </div>
    <div class="fld"><label>臨床情境 <span class="en">為什麼要學它 · 深讀第一章</span></label><textarea id="f_ctx">${esc(c.clinicalContext||'')}</textarea></div>
    <div class="fld"><label>機轉 <span class="en">Mechanism</span></label><textarea id="f_mec">${esc(c.mechanism||'')}</textarea></div>
    <div class="duo">
      <div class="fld"><label>劑型 <span class="en">Formulation</span></label><input id="f_for" value="${esc(c.formulation||'')}"></div>
      <div class="fld"><label>常用劑量 <span class="en">Dosing</span></label><input id="f_dos" value="${esc(c.dosing||'')}"></div>
    </div>
    <div class="fld"><label>常見用法 <span class="en">臨床實務慣例</span></label><textarea id="f_cu">${esc(c.commonUsage||'')}</textarea></div>
    <div class="fld"><label>藥物外觀照片 <span class="en">建議自己拍實際品項，最準</span></label>
      <div class="ph-box">
        <div class="ph-prev" id="phPrev"></div>
        <div class="ph-ctl">
          <button type="button" class="btn btn-line" id="phPick">選擇圖片</button>
          <button type="button" class="btn btn-line" id="phClr">清除</button>
          <div class="ph-hint">也可以直接 Ctrl+V 貼上截圖。圖片會自動壓縮後存在本機。</div>
        </div>
      </div>
      <input type="file" id="phFile" accept="image/*" style="display:none">
      <input id="f_pho" type="hidden" value="${esc(c.photoUrl||'')}">
    </div>
    <div class="fld"><label>外型描述 <span class="en">顏色 · 形狀 · 標記</span></label><input id="f_app" value="${esc(c.appearance||'')}"></div>
    <div class="fld"><label>適應症 <span class="en">Indications</span></label><textarea id="f_ind">${esc(c.indications||'')}</textarea></div>
    <div class="fld"><label>指引地位 <span class="en">權威學會依據</span></label><input id="f_gl" value="${esc(c.guideline||'')}"></div>
    <div class="fld"><label>近期文獻 <span class="en">重點摘要</span></label><textarea id="f_lit">${esc(c.literature||'')}</textarea></div>
    <div class="fld"><label>自訂欄位 <span class="en">健保碼 · 儲存條件 · 交互作用…任何你想加的</span></label><div id="extra"></div><button type="button" class="btn btn-line" id="addField" style="margin-top:5px;">＋ 新增欄位</button></div>
    <div class="sheet-foot">
      ${!isNew?'<button class="link" id="del" style="margin-right:auto;">刪除這筆</button>':''}
      <button class="btn btn-line" id="cancel">取消</button>
      <button class="btn btn-blue" id="save">儲存</button>
    </div>
  </div>`;
  document.body.appendChild(veil);
  // ---- 照片：選檔 / 貼上 / 壓縮 / 預覽 ----
  const phHidden=document.getElementById('f_pho');
  function drawPh(){
    const v=phHidden.value;
    document.getElementById('phPrev').innerHTML=v
      ? `<img src="${v}" alt="外觀預覽">`
      : `<div class="ph-none">尚無圖片</div>`;
  }
  function compressImg(file){
    if(!file||!/^image\//.test(file.type)){toast('請選擇圖片檔');return;}
    const r=new FileReader();
    r.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=460;
        let w=img.width,h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        const cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        phHidden.value=cv.toDataURL('image/jpeg',0.75);
        drawPh();
        toast('圖片已加入，記得按儲存');
      };
      img.onerror=()=>toast('這個圖片檔讀不出來');
      img.src=r.result;
    };
    r.readAsDataURL(file);
  }
  drawPh();
  const phFile=document.getElementById('phFile');
  document.getElementById('phPick').onclick=()=>phFile.click();
  phFile.onchange=()=>{if(phFile.files[0])compressImg(phFile.files[0]);};
  document.getElementById('phClr').onclick=()=>{phHidden.value='';drawPh();};
  veil.addEventListener('paste',e=>{
    const it=[...(e.clipboardData||{}).items||[]].find(x=>/^image\//.test(x.type));
    if(it){e.preventDefault();compressImg(it.getAsFile());}
  });
  const catSel=document.getElementById('f_cat');
  function fillDis(){
    document.getElementById('disList').innerHTML=disOf(catSel.value).map(d=>`<option value="${esc(d)}">`).join('');
  }
  fillDis();
  catSel.onchange=fillDis;
  let extra=JSON.parse(JSON.stringify(c.extraFields||[]));
  function drawExtra(){
    const w=document.getElementById('extra');
    w.innerHTML=extra.map((f,i)=>`<div class="rowx"><input class="ef-l" placeholder="欄位名稱" value="${esc(f.label||'')}"><textarea class="ef-v" placeholder="內容">${esc(f.value||'')}</textarea><button type="button" class="rm" data-i="${i}">✕</button></div>`).join('');
    w.querySelectorAll('.rm').forEach(b=>b.onclick=()=>{extra.splice(+b.dataset.i,1);drawExtra();});
  }
  drawExtra();
  document.getElementById('addField').onclick=()=>{extra.push({label:'',value:''});drawExtra();};
  veil.onclick=e=>{if(e.target===veil)veil.remove();};
  document.getElementById('cancel').onclick=()=>veil.remove();
  const del=document.getElementById('del');
  if(del)del.onclick=()=>{state.cards=state.cards.filter(x=>x.id!==c.id);saveData();veil.remove();buildQueue();render();toast('已刪除');};
  document.getElementById('save').onclick=()=>{
    c.generic=document.getElementById('f_gen').value.trim();
    c.trade=document.getElementById('f_tra').value.trim();
    c.category=document.getElementById('f_cat').value;
    c.disease=document.getElementById('f_dis').value.trim();
    c.clinicalContext=document.getElementById('f_ctx').value.trim();
    c.mechanism=document.getElementById('f_mec').value.trim();
    c.formulation=document.getElementById('f_for').value.trim();
    c.dosing=document.getElementById('f_dos').value.trim();
    c.commonUsage=document.getElementById('f_cu').value.trim();
    c.photoUrl=document.getElementById('f_pho').value.trim();
    c.appearance=document.getElementById('f_app').value.trim();
    c.indications=document.getElementById('f_ind').value.trim();
    c.guideline=document.getElementById('f_gl').value.trim();
    c.literature=document.getElementById('f_lit').value.trim();
    c.extraFields=Array.from(document.querySelectorAll('#extra .rowx')).map(r=>({label:r.querySelector('.ef-l').value.trim(),value:r.querySelector('.ef-v').value.trim()})).filter(f=>f.label);
    if(!c.generic){toast('請至少填寫學名');return;}
    if(isNew){c.nextReview=todayStr();c.level=0;c.reviewCount=0;state.cards.push(c);}
    else{const i=state.cards.findIndex(x=>x.id===c.id);state.cards[i]=c;}
    syncTax();
    saveData();veil.remove();buildQueue();render();toast('已儲存');
  };
}

/* ---------------- taxonomy manager ---------------- */
function openTaxMgr(){
  let draft=JSON.parse(JSON.stringify(state.tax));
  const veil=document.createElement('div');veil.className='veil';
  veil.innerHTML=`<div class="sheet">
    <h3>管理階層</h3>
    <div class="sub">科別 › 疾病。可改名、調整順序、新增或刪除。改名後底下的藥物會自動跟著更新。</div>
    <div id="taxWrap"></div>
    <button type="button" class="btn btn-line" id="addCat" style="width:100%;margin-top:6px;">＋ 新增科別</button>
    <div class="sheet-foot">
      <button class="btn btn-line" id="taxCancel">取消</button>
      <button class="btn btn-blue" id="taxSave">儲存階層</button>
    </div>
  </div>`;
  document.body.appendChild(veil);

  function cnt(catName,disName){
    return state.cards.filter(c=>c.category===catName&&(disName===undefined||(c.disease||NO_DIS)===disName)).length;
  }
  function draw(){
    document.getElementById('taxWrap').innerHTML=draft.map((t,i)=>`
      <div class="tax-cat">
        <div class="tax-row">
          <input class="cat-n" data-i="${i}" value="${esc(t.name)}" placeholder="科別名稱">
          <button type="button" class="ico" data-up="${i}" ${i===0?'disabled':''} title="上移">▲</button>
          <button type="button" class="ico" data-dn="${i}" ${i===draft.length-1?'disabled':''} title="下移">▼</button>
          <button type="button" class="ico dz" data-delc="${i}" title="刪除科別">✕</button>
        </div>
        <div class="tax-subs">
          ${t.diseases.map((d,j)=>`
            <div class="tax-row sub">
              <input class="dis-n" data-i="${i}" data-j="${j}" value="${esc(d.name)}" placeholder="疾病名稱">
              <button type="button" class="ico" data-dup="${i}_${j}" ${j===0?'disabled':''} title="上移">▲</button>
              <button type="button" class="ico" data-ddn="${i}_${j}" ${j===t.diseases.length-1?'disabled':''} title="下移">▼</button>
              <button type="button" class="ico dz" data-deld="${i}_${j}" title="刪除疾病">✕</button>
            </div>`).join('')}
          <button type="button" class="mini" data-addd="${i}" style="text-align:left;">＋ 新增疾病</button>
          ${cnt(t.name)?`<div class="tax-note">此科別下有 ${cnt(t.name)} 個藥物</div>`:''}
        </div>
      </div>`).join('');
    // 先把畫面上的輸入值收回 draft，避免重繪時丟失
    const wrap=document.getElementById('taxWrap');
    wrap.querySelectorAll('.cat-n').forEach(el=>el.oninput=()=>{draft[+el.dataset.i].name=el.value;});
    wrap.querySelectorAll('.dis-n').forEach(el=>el.oninput=()=>{draft[+el.dataset.i].diseases[+el.dataset.j].name=el.value;});
    wrap.querySelectorAll('[data-up]').forEach(b=>b.onclick=()=>{const i=+b.dataset.up;[draft[i-1],draft[i]]=[draft[i],draft[i-1]];draw();});
    wrap.querySelectorAll('[data-dn]').forEach(b=>b.onclick=()=>{const i=+b.dataset.dn;[draft[i+1],draft[i]]=[draft[i],draft[i+1]];draw();});
    wrap.querySelectorAll('[data-delc]').forEach(b=>b.onclick=()=>{
      const i=+b.dataset.delc;
      if(cnt(draft[i].name)>0){toast(`「${draft[i].name}」底下還有 ${cnt(draft[i].name)} 個藥物，請先移走再刪`);return;}
      draft.splice(i,1);draw();
    });
    wrap.querySelectorAll('[data-dup]').forEach(b=>b.onclick=()=>{const[i,j]=b.dataset.dup.split('_').map(Number);const a=draft[i].diseases;[a[j-1],a[j]]=[a[j],a[j-1]];draw();});
    wrap.querySelectorAll('[data-ddn]').forEach(b=>b.onclick=()=>{const[i,j]=b.dataset.ddn.split('_').map(Number);const a=draft[i].diseases;[a[j+1],a[j]]=[a[j],a[j+1]];draw();});
    wrap.querySelectorAll('[data-deld]').forEach(b=>b.onclick=()=>{
      const[i,j]=b.dataset.deld.split('_').map(Number);
      const n=cnt(draft[i].name,draft[i].diseases[j].name);
      if(n>0&&!confirm(`「${draft[i].diseases[j].name}」底下有 ${n} 個藥物。刪除後這些藥物會退回「${NO_DIS}」，藥物本身不會被刪除。要繼續嗎？`))return;
      draft[i].diseases.splice(j,1);draw();
    });
    wrap.querySelectorAll('[data-addd]').forEach(b=>b.onclick=()=>{draft[+b.dataset.addd].diseases.push({id:uid(),name:''});draw();});
  }
  draw();
  document.getElementById('addCat').onclick=()=>{draft.push({id:uid(),name:'',diseases:[]});draw();};
  veil.onclick=e=>{if(e.target===veil)veil.remove();};
  document.getElementById('taxCancel').onclick=()=>veil.remove();
  document.getElementById('taxSave').onclick=()=>{
    // 清掉空白名稱
    draft.forEach(t=>{t.diseases=t.diseases.filter(d=>d.name.trim());t.name=t.name.trim();});
    draft=draft.filter(t=>t.name);
    // 重複名稱檢查
    const names=draft.map(t=>t.name);
    if(new Set(names).size!==names.length){toast('科別名稱重複了，請改成不一樣的');return;}
    for(const t of draft){
      const dn=t.diseases.map(d=>d.name);
      if(new Set(dn).size!==dn.length){toast(`「${t.name}」裡有重複的疾病名稱`);return;}
    }
    // 依 id 比對改名，同步更新藥物卡
    state.tax.forEach(oldT=>{
      const nt=draft.find(x=>x.id===oldT.id);
      if(!nt)return;
      if(nt.name!==oldT.name){state.cards.forEach(c=>{if(c.category===oldT.name)c.category=nt.name;});}
      oldT.diseases.forEach(oldD=>{
        const nd=nt.diseases.find(x=>x.id===oldD.id);
        if(nd&&nd.name!==oldD.name){
          state.cards.forEach(c=>{if(c.category===nt.name&&c.disease===oldD.name)c.disease=nd.name;});
        }else if(!nd){
          state.cards.forEach(c=>{if(c.category===nt.name&&c.disease===oldD.name)c.disease='';});
        }
      });
    });
    state.tax=draft;
    if(!findCat(state.filter))state.filter="全部";
    state.fdis=null;
    syncTax();saveData();veil.remove();buildQueue();render();toast('階層已更新');
  };
}

/* ---------------- batch ---------------- */
function openBatch(){
  const veil=document.createElement('div');veil.className='veil';
  veil.innerHTML=`<div class="sheet">
    <h3>批次貼上</h3>
    <div class="sub">每個藥一段，欄位用「標籤：內容」，段落之間用一行 --- 分隔。沒列出的標籤（如「健保碼」）會自動存成自訂欄位。若貼上與現有藥物同名，會更新那張卡而不是新增重複卡。</div>
    <textarea class="paste" id="paste" placeholder="學名：Atorvastatin&#10;商品名：Lipitor&#10;分類：心臟血管&#10;疾病：血脂異常&#10;臨床情境：…&#10;機轉：…&#10;常用劑量：…&#10;指引：…"></textarea>
    <div class="sheet-foot">
      <button class="btn btn-line" id="cancel2">取消</button>
      <button class="btn btn-blue" id="parse">解析並存入</button>
    </div>
  </div>`;
  document.body.appendChild(veil);
  veil.onclick=e=>{if(e.target===veil)veil.remove();};
  document.getElementById('cancel2').onclick=()=>veil.remove();
  document.getElementById('parse').onclick=()=>{
    const raw=document.getElementById('paste').value;
    const blocks=raw.split(/\n-{3,}\s*(?:\n|$)/).map(b=>b.trim()).filter(Boolean);
    let added=0,updated=0;
    blocks.forEach(block=>{
      const o={extraFields:[]};
      block.split('\n').forEach(line=>{
        const m=line.match(/^\s*([^:：]+)[:：]\s*(.*)$/);if(!m)return;
        const k=m[1].trim(),v=m[2].trim();
        if(/商品名|trade/i.test(k))o.trade=v;
        else if(/學名|generic/i.test(k))o.generic=v;
        else if(/分類|科別|category/i.test(k))o.category=v;
        else if(/疾病|disease/i.test(k))o.disease=v;
        else if(/臨床情境|背景|context/i.test(k))o.clinicalContext=v;
        else if(/機轉|mechanism/i.test(k))o.mechanism=v;
        else if(/劑型|formulation/i.test(k))o.formulation=v;
        else if(/常見用法|common usage/i.test(k))o.commonUsage=v;
        else if(/劑量|dose|dosing/i.test(k))o.dosing=v;
        else if(/照片|photo/i.test(k))o.photoUrl=v;
        else if(/外型|外觀|appearance/i.test(k))o.appearance=v;
        else if(/適應症|indication/i.test(k))o.indications=v;
        else if(/guideline|指引/i.test(k))o.guideline=v;
        else if(/文獻|literature/i.test(k))o.literature=v;
        else o.extraFields.push({label:k,value:v});
      });
      if(!o.generic)return;
      if(!o.category)o.category="其他";
      const existing=state.cards.find(c=>(c.generic||'').toLowerCase()===o.generic.toLowerCase());
      if(existing){
        Object.keys(o).forEach(key=>{if(key==='extraFields'){if(o.extraFields.length)existing.extraFields=o.extraFields;}else existing[key]=o[key];});
        updated++;
      }else{
        o.id=uid();o.nextReview=todayStr();o.level=0;o.reviewCount=0;state.cards.push(o);added++;
      }
    });
    syncTax();saveData();veil.remove();buildQueue();render();
    toast((added||updated)?`新增 ${added}・更新 ${updated}`:'沒有解析到有效資料');
  };
}

(async function(){await loadData();buildQueue();render();})();
